name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            cache-key: macos-x86_64
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            cache-key: macos-aarch64
          - platform: "windows-latest"
            args: "--target x86_64-pc-windows-msvc"
            cache-key: windows-x86_64
          - platform: "windows-latest"
            args: "--target aarch64-pc-windows-msvc"
            cache-key: windows-aarch64
          - platform: "ubuntu-24.04"
            args: ""
            cache-key: linux-x86_64
          - platform: "ubuntu-24.04-arm"
            args: ""
            cache-key: linux-aarch64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf pkg-config libssl-dev libsoup2.4-dev javascriptcoregtk-4.0 webkit2gtk-4.0 xdg-utils

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets:
            ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' ||
            '' }}

      - name: Install macOS Rust targets
        if: contains(matrix.platform, 'macos')
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: pnpm Setup
        uses: pnpm/action-setup@v4

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          # Must match cache-warm.yml: tag refs can only restore caches created
          # on the default branch, and caches saved on a tag are unreachable
          # from other tags - so warming happens on main, saving here is wasted.
          shared-key: release-${{ matrix.cache-key }}
          save-if: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm" # Set this to npm, yarn or pnpm.

      - name: Install frontend dependencies
        # If you don't have `beforeBuildCommand` configured you may want to build your frontend here too.
        run: pnpm install # Change this to npm, yarn or pnpm.

      - name: Install Rust targets
        if: matrix.platform == 'windows-latest'
        run: rustup target add aarch64-pc-windows-msvc x86_64-pc-windows-msvc

      - name: Determine Windows bundle targets
        if: contains(matrix.platform, 'windows')
        id: win-bundles
        shell: bash
        run: |
          # If version has a non-numeric pre-release (e.g. beta), skip MSI (WiX requires numeric-only)
          ARGS=$(node -e "
            const v = require('./apps/tauri/tauri.conf.json').version;
            console.log(/\-.*[a-zA-Z]/.test(v) ? '--bundles nsis' : '');
          ")
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Build the app
        uses: tauri-apps/tauri-action@v0

        env:
          # Wealthfolio Connect (set variables to enable; omit to build without Connect)
          CONNECT_AUTH_URL: ${{ vars.CONNECT_AUTH_URL }}
          CONNECT_AUTH_PUBLISHABLE_KEY: ${{ vars.CONNECT_AUTH_PUBLISHABLE_KEY }}
          CONNECT_API_URL: ${{ vars.CONNECT_API_URL }}
          CONNECT_OAUTH_CALLBACK_URL: ${{ vars.CONNECT_OAUTH_CALLBACK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }} # This only works if the workflow triggers on new tags.
          releaseName: "Wealthfolio v__VERSION__" # tauri-action replaces \_\_VERSION\_\_ with the app version.
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} ${{ steps.win-bundles.outputs.args }}

  prebuild-server-linux:
    # Standalone server tarball for self-hosters (Proxmox LXC, bare metal, systemd).
    # Tracks: https://github.com/wealthfolio/wealthfolio/issues/563
    # Built on ubuntu-22.04 (glibc 2.35) for forward compatibility with Debian 12+/Ubuntu 22.04+.
    # Runs in parallel with `release`: the GitHub release is created manually before
    # the tag push, so there is no creation race — jobs only attach assets to it.
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libsqlite3-dev build-essential

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          # Must match cache-warm.yml (see note in the release job above).
          shared-key: prebuild-server-linux-amd64
          save-if: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: pnpm setup
        uses: pnpm/action-setup@v4

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (web target)
        env:
          BUILD_TARGET: web
          CONNECT_AUTH_URL: ${{ vars.CONNECT_AUTH_URL }}
          CONNECT_AUTH_PUBLISHABLE_KEY: ${{ vars.CONNECT_AUTH_PUBLISHABLE_KEY }}
        run: pnpm --filter frontend... build

      - name: Build server binary
        env:
          OPENSSL_STATIC: "1"
          CONNECT_AUTH_URL: ${{ vars.CONNECT_AUTH_URL }}
          CONNECT_AUTH_PUBLISHABLE_KEY: ${{ vars.CONNECT_AUTH_PUBLISHABLE_KEY }}
          CONNECT_API_URL: ${{ vars.CONNECT_API_URL }}
        run: cargo build --release --manifest-path apps/server/Cargo.toml

      - name: Verify server binary runtime dependencies
        run: |
          ldd target/release/wealthfolio-server
          if ldd target/release/wealthfolio-server | grep -E 'lib(ssl|crypto)\.so'; then
            echo "Server binary still links dynamically to OpenSSL"
            exit 1
          fi

      - name: Stage tarball contents
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="wealthfolio-server-${VERSION}-linux-amd64"
          mkdir -p "${STAGE}"
          cp target/release/wealthfolio-server "${STAGE}/wealthfolio-server"
          cp -r dist "${STAGE}/dist"
          cp LICENSE "${STAGE}/LICENSE" 2>/dev/null || true
          cp packaging/server-prebuild/wealthfolio.service.example "${STAGE}/wealthfolio.service.example"
          cp packaging/server-prebuild/README.md "${STAGE}/README.md"

      - name: Create tarball + checksum
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="wealthfolio-server-${VERSION}-linux-amd64"
          tar -czf "${STAGE}.tar.gz" "${STAGE}"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            wealthfolio-server-*-linux-amd64.tar.gz
            wealthfolio-server-*-linux-amd64.tar.gz.sha256
